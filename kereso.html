<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raktárkataszter kereső</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="kereso.css">
</head>

<body ng-app="archivesearch" ng-controller="storeLists" ng-class="currentTheme">
    <h1>Levéltári kereső</h1>
    <button ng-click="themechange()">Sötét/Világos mód</button>
    <button id="resetBtn" disabled>Alapértelmezés visszaállítása</button>

    <div class="container rounded-5 shadow-lg mt-3" id="floor">

        <h3 class="text-center p-2">Először válassz egy emeletet, majd a kívánt raktárat!</h3>
        <div class="gyik-item gyik-item mb-2">
            <div class="question rounded-top"><i class="bi bi-arrow-right"></i> Földszint <span>+</span></div>
            <div class="answer rounded-bottom">
                <div id="groundfloor" class="storebtn p-4">
                    <button onclick="loadArchive('013')" value="013" id="013store" class="loadarchivebtn p-2 border border-3 border-danger">013-as raktár</button>
                </div>
            </div>
        </div>

        <div class="gyik-item gyik-item mb-2">
            <div class="question rounded-top"><i class="bi bi-arrow-right"></i> Első emelet <span>+</span></div>
            <div class="answer rounded-bottom">
                <div id="firstfloor" class="storebtn p-4">
                    <button onclick="loadArchive('105')" value="105" id="105store" class="loadarchivebtn p-2 border border-3 border-danger">105-ös raktár</button>
                </div>
            </div>
        </div>

        <div class="gyik-item gyik-item mb-2">
            <div class="question rounded-top"><i class="bi bi-arrow-right"></i> Második emelet <span>+</span></div>
            <div class="answer rounded-bottom">
                <div id="secondfloor" class="storebtn p-4">
                    <button onclick="loadArchive('207')" value="207" id="207store" class="loadarchivebtn p-2 border border-3 border-danger">207-es raktár</button>
                    <button onclick="loadArchive('208')" value="208" id="208store" class="loadarchivebtn p-2 border border-3 border-danger">208-es raktár</button>
                </div>
            </div>
        </div>

        <input class="me-2 mt-3 w-50 searchfield" type="search"
            placeholder="Az emelet és a raktár kiválasztása után, tudsz keresni!" aria-label="Search"
            id="search-input"/>
        <button class="mt-3 mb-3" id="searchBtn">Keresés</button>
        <br>

        <p id="pages">Aktuális oldal <span id="actualpage"> 0</span>/ Összes oldal <span id="allpages"> 0</span></p>
        <div id="tartalom-container">
            <p>Válassz egy adatbázist az adatok betöltéséhez.</p>

        </div>
        <div class="btncontainer">
            <div>
            <button class="border border-3 border-danger mt-3 mb-3" id="prevpage">Előző oldal</button></div>
            <div><button class="border border-3 border-danger mt-3 mb-3" id="nextpage">Következő oldal</button></div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="kereso.js"></script>
</body>

</html>
